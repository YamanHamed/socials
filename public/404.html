<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }
      .loader {
        text-align: center;
      }
      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      p {
        color: #666;
        margin: 0;
      }
    </style>
    <script>
      (function () {
        // Get the full path that was requested
        const fullPath = window.location.pathname;

        // Remove the repository name from the path
        // Your repo: socials-project
        let targetPath = fullPath.replace("/socials-project", "");

        // If the path is empty, go to root
        if (!targetPath || targetPath === "") {
          targetPath = "/";
        }

        // Get any search params (query string)
        const searchParams = window.location.search;

        // Build the redirect URL
        let redirectUrl = "/socials-project/";

        // Add the path as a query parameter
        redirectUrl += `?redirect=${encodeURIComponent(targetPath)}`;

        // Preserve any existing query params
        if (searchParams && searchParams !== "?") {
          redirectUrl += `&originalParams=${encodeURIComponent(searchParams)}`;
        }

        // Add timestamp to prevent caching issues
        redirectUrl += `&_t=${Date.now()}`;

        // Log for debugging (remove in production if you want)
        console.log("404 redirect:", {
          originalPath: fullPath,
          targetPath: targetPath,
          redirectUrl: redirectUrl,
        });

        // Perform the redirect
        window.location.href = redirectUrl;
      })();
    </script>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <p>Redirecting...</p>
    </div>
  </body>
</html>
